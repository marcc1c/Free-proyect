<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <style>
    .title { font: bold 28px Arial, sans-serif; fill: #111; }
    .text { font: 22px Arial, sans-serif; fill: #111; }
    .small { font: 18px Arial, sans-serif; fill: #111; }
    .actor { stroke: #111; stroke-width: 3; fill: none; }
    .system { stroke: #111; stroke-width: 3; fill: #f8f8f8; }
    .usecase { stroke: #111; stroke-width: 2.5; fill: #dfe8f7; }
    .usecase2 { stroke: #111; stroke-width: 2.5; fill: #f6efc9; }
    .external { stroke: #111; stroke-width: 2.5; fill: #ddd3e8; }
    .line { stroke: #111; stroke-width: 2.5; fill: none; }
    .dashed { stroke: #111; stroke-width: 2.5; fill: none; stroke-dasharray: 10 8; }
  </style>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#111"></path>
    </marker>
  </defs>

  <!-- Sistema -->
  <rect x="260" y="40" rx="20" ry="20" width="900" height="780" class="system"></rect>
  <text x="710" y="85" text-anchor="middle" class="title">SISTEMA DE RESERVA D’HOTELS</text>

  <!-- Actor Usuari -->
  <circle cx="100" cy="250" r="20" class="actor"></circle>
  <line x1="100" y1="270" x2="100" y2="340" class="actor"></line>
  <line x1="65" y1="290" x2="135" y2="290" class="actor"></line>
  <line x1="100" y1="340" x2="70" y2="385" class="actor"></line>
  <line x1="100" y1="340" x2="130" y2="385" class="actor"></line>
  <text x="100" y="430" text-anchor="middle" class="text">Usuari</text>

  <!-- Sistema de Pagament -->
  <rect x="1210" y="560" rx="8" ry="8" width="170" height="90" class="external"></rect>
  <text x="1295" y="595" text-anchor="middle" class="small">«sistema extern»</text>
  <text x="1295" y="625" text-anchor="middle" class="text">Sistema de Pagament</text>

  <!-- Casos de uso principales -->
  <ellipse cx="500" cy="170" rx="140" ry="55" class="usecase"></ellipse>
  <text x="500" y="178" text-anchor="middle" class="text">Cercar hotels</text>

  <ellipse cx="500" cy="320" rx="170" ry="65" class="usecase"></ellipse>
  <text x="500" y="312" text-anchor="middle" class="text">Seleccionar hotel</text>
  <text x="500" y="342" text-anchor="middle" class="text">i habitació</text>

  <ellipse cx="500" cy="520" rx="150" ry="60" class="usecase"></ellipse>
  <text x="500" y="528" text-anchor="middle" class="text">Reservar habitació</text>

  <ellipse cx="500" cy="710" rx="180" ry="70" class="usecase"></ellipse>
  <text x="500" y="700" text-anchor="middle" class="text">Consultar / Gestionar</text>
  <text x="500" y="730" text-anchor="middle" class="text">les meves reserves</text>

  <!-- Casos de uso descuentos y pago -->
  <ellipse cx="900" cy="280" rx="135" ry="55" class="usecase2"></ellipse>
  <text x="900" y="288" text-anchor="middle" class="text">Aplicar descompte</text>

  <ellipse cx="920" cy="430" rx="135" ry="55" class="usecase2"></ellipse>
  <text x="920" y="423" text-anchor="middle" class="text">Validar condicions</text>
  <text x="920" y="452" text-anchor="middle" class="text">de descompte</text>

  <ellipse cx="900" cy="600" rx="145" ry="60" class="usecase2"></ellipse>
  <text x="900" y="608" text-anchor="middle" class="text">Processar pagament</text>

  <!-- Asociaciones usuario -->
  <line x1="150" y1="300" x2="390" y2="190" class="line"></line>
  <line x1="150" y1="300" x2="340" y2="330" class="line"></line>
  <line x1="150" y1="300" x2="350" y2="520" class="line"></line>
  <line x1="150" y1="300" x2="345" y2="700" class="line"></line>

  <!-- Relaciones include/extend -->
  <line x1="650" y1="520" x2="760" y2="585" class="dashed" marker-end="url(#arrow)"></line>
  <text x="705" y="535" class="small">«include»</text>

  <line x1="900" y1="375" x2="900" y2="335" class="dashed" marker-end="url(#arrow)"></line>
  <text x="915" y="360" class="small">«include»</text>

  <line x1="790" y1="310" x2="620" y2="470" class="dashed" marker-end="url(#arrow)"></line>
  <text x="700" y="395" class="small">«extend»</text>

  <!-- Asociación pago -->
  <line x1="1045" y1="600" x2="1210" y2="600" class="line"></line>
</svg>